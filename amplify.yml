version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm i -g pnpm@9
        - pnpm config set store-dir .pnpm-store
        - rm -rf node_modules
        - pnpm install
    build:
      commands:
        - pnpm run build
        - echo "Static build completed successfully"
        - ls -la dist/
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - .pnpm-store/**/*
appType: static